query GetCollectionMedia($userId:Int!, $status: [MediaListStatus]!) {
    anime:MediaListCollection(userId: $userId, type: ANIME, status_in: $status) {
        ...CollectionFragment
    }
    manga:MediaListCollection(userId: $userId, type: MANGA, status_in: $status) {
        ...CollectionFragment
    }
}

fragment CollectionFragment on MediaListCollection {
    lists {
        name
        status
        entries {
            ...EntryFragment
            media {
                ...MediaFragment
            }
        }
    }
}